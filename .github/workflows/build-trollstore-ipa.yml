name: Build TrollStore IPA

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          set -euo pipefail
          brew untap aws/tap || true
          brew install xcodegen ldid

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build unsigned app
        run: |
          set -euo pipefail
          xcodebuild \
            -project LJ2600DPrint.xcodeproj \
            -scheme LJ2600DPrint \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package TrollStore IPA
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release-iphoneos/LJ2600DPrint.app"
          test -d "$APP"
          EXECUTABLE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP/Info.plist")
          test -n "$EXECUTABLE"
          test -f "$APP/$EXECUTABLE"
          mkdir -p Payload
          cp -R "$APP" Payload/
          ldid -S "Payload/LJ2600DPrint.app/$EXECUTABLE"
          zip -qry LJ2600DPrint.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LJ2600DPrint-TrollStore
          path: LJ2600DPrint.ipa
